<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostiX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="toggleTema">🌙</button>

<!-- LOGIN -->
<div id="loginArea" class="login-area glass">

  <img src="assets/logo.png" class="logo-login" alt="PostiX">

  <h2>Acesso ao PostiX</h2>

  <input type="email" id="emailLogin" placeholder="Email">

  <!-- SENHA COM OLHO -->
  <div class="senha-box">
  <input type="password" id="senhaLogin" placeholder="Senha">
  <span class="ver-senha" onclick="alternarSenha()">

  <!-- OLHO ABERTO -->
  <svg id="iconEye" xmlns="http://www.w3.org/2000/svg" 
       width="20" height="20" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>

  <!-- OLHO FECHADO -->
  <svg id="iconEyeOff" xmlns="http://www.w3.org/2000/svg" 
       width="20" height="20" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none;">
    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"/>
    <path d="M1 1l22 22"/>
    <path d="M9.88 9.88A3 3 0 0 0 12 15a3 3 0 0 0 2.12-.88"/>
  </svg>

</span>
</div>

  <button onclick="fazerLogin()">Entrar</button>

  <p id="loginMensagem"></p>

</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
  <img src="assets/logo.png" class="logo" alt="PostiX">
</header>

<div class="container glass">

  <div class="upload-box">
    <input type="file" id="upload" accept="image/*">
  </div>

  <div class="inputs">

    <input type="number" id="larguraCm" placeholder="Largura (cm)">
    <input type="number" id="alturaCm" placeholder="Altura (cm)">

    <select id="formato">
      <option value="A4">A4</option>
      <option value="A3">A3</option>
      <option value="A2">A2</option>
      <option value="A1">A1</option>
      <option value="A5">A5</option>
    </select>

    <select id="orientacao">
      <option value="portrait">Retrato</option>
      <option value="landscape">Paisagem</option>
    </select>

    <input type="number" id="margemMm" value="5" placeholder="Margem (mm)">

    <div class="campo">
      <label>
        Sangria
        <span onclick="abrirPopup()" class="info">ⓘ</span>
      </label>
      <input type="number" id="bleedMm" value="3">
    </div>

  </div>

  <div class="botoes">
    <button onclick="gerarPreview()">Preview</button>
    <button onclick="gerarPDF()">PDF</button>
    <button onclick="limparTudo()">Limpar</button>
    <button onclick="sair()">Sair</button>
  </div>

  <div class="progresso-container">
    <div id="barra"></div>
  </div>

  <p id="status"></p>

  <div id="preview" class="preview-area glass"></div>

</div>
</div>

<!-- POPUP -->
<div id="popupOverlay" class="popup-overlay">
  <div class="popup-box">
    <h3>Sangria</h3>
    <p>Área extra para evitar bordas brancas no corte.</p>
    <button onclick="fecharPopup()">Ok</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
